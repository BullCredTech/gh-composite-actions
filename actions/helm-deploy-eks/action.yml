name: Helm deploy to EKS
description: Assume an OIDC role, configure kubectl/helm, and run helm upgrade --install with rollout wait.

inputs:
  aws-region:
    description: AWS region of the EKS cluster.
    required: false
    default: us-east-1
  aws-role-arn:
    description: IAM role ARN to assume via GitHub OIDC (must be allowed by an EKS Access Entry on the cluster).
    required: true
  role-session-name:
    description: STS session name.
    required: false
    default: gha-helm-deploy-eks
  cluster-name:
    description: EKS cluster name.
    required: true
  namespace:
    description: Kubernetes namespace.
    required: true
  release:
    description: Helm release name.
    required: true
  chart-path:
    description: Filesystem path to the Helm chart directory.
    required: true
  values-file:
    description: Path to the environment-specific values file.
    required: true
  image-repository:
    description: Container image repository (without tag).
    required: true
  image-tag:
    description: Container image tag to deploy.
    required: true
  helm-version:
    description: Helm CLI version.
    required: false
    default: v3.15.4
  timeout:
    description: Helm/rollout timeout (e.g. 5m).
    required: false
    default: 5m
  extra-set:
    description: Optional additional --set flags (newline-separated key=value pairs).
    required: false
    default: ""
  create-namespace:
    description: Whether to pass --create-namespace to helm upgrade.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        role-session-name: ${{ inputs.role-session-name }}
        aws-region: ${{ inputs.aws-region }}

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    - name: Setup helm
      uses: azure/setup-helm@v4
      with:
        version: ${{ inputs.helm-version }}

    - name: Update kubeconfig
      shell: bash
      run: |
        aws eks update-kubeconfig \
          --name "${{ inputs.cluster-name }}" \
          --region "${{ inputs.aws-region }}"

    - name: Helm lint
      shell: bash
      run: |
        helm lint "${{ inputs.chart-path }}" -f "${{ inputs.values-file }}"

    - name: Helm upgrade --install
      shell: bash
      env:
        EXTRA_SET: ${{ inputs.extra-set }}
        CREATE_NS: ${{ inputs.create-namespace }}
      run: |
        set -euo pipefail
        cmd=(helm upgrade --install "${{ inputs.release }}" "${{ inputs.chart-path }}"
             --namespace "${{ inputs.namespace }}"
             -f "${{ inputs.values-file }}"
             --set image.repository="${{ inputs.image-repository }}"
             --set image.tag="${{ inputs.image-tag }}"
             --atomic --timeout "${{ inputs.timeout }}")
        if [ "${CREATE_NS}" = "true" ]; then
          cmd+=(--create-namespace)
        fi
        if [ -n "${EXTRA_SET}" ]; then
          while IFS= read -r kv; do
            [ -z "$kv" ] && continue
            cmd+=(--set "$kv")
          done <<< "${EXTRA_SET}"
        fi
        "${cmd[@]}"

    - name: Wait for rollout
      shell: bash
      run: |
        kubectl -n "${{ inputs.namespace }}" rollout status \
          deploy/"${{ inputs.release }}" \
          --timeout="${{ inputs.timeout }}"
