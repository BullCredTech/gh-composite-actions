name: Build and Push to ECR
description: Assume an OIDC role, log into ECR, build the image with Buildx, and push.

inputs:
  aws-region:
    description: AWS region of the ECR registry.
    required: false
    default: us-east-1
  aws-role-arn:
    description: IAM role ARN to assume via GitHub OIDC.
    required: true
  role-session-name:
    description: STS session name.
    required: false
    default: gha-build-push-ecr
  ecr-registry:
    description: ECR registry hostname (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com).
    required: true
  ecr-repository:
    description: ECR repository name.
    required: true
  image-tag:
    description: Primary image tag (e.g. commit SHA).
    required: true
  extra-tags:
    description: Newline-separated list of additional tags to push (optional).
    required: false
    default: ""
  context:
    description: Docker build context.
    required: false
    default: "."
  dockerfile:
    description: Path to the Dockerfile.
    required: false
    default: "./Dockerfile"
  build-args:
    description: Newline-separated list of build args (KEY=VALUE).
    required: false
    default: ""

outputs:
  image-uri:
    description: Fully-qualified URI of the pushed image with the primary tag.
    value: ${{ steps.image.outputs.uri }}

runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        role-session-name: ${{ inputs.role-session-name }}
        aws-region: ${{ inputs.aws-region }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Compose tag list
      id: tags
      shell: bash
      run: |
        primary="${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}"
        {
          echo "tags<<EOF"
          echo "$primary"
          if [ -n "${{ inputs.extra-tags }}" ]; then
            while IFS= read -r t; do
              [ -z "$t" ] && continue
              echo "${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}:${t}"
            done <<< "${{ inputs.extra-tags }}"
          fi
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        provenance: false
        tags: ${{ steps.tags.outputs.tags }}
        build-args: ${{ inputs.build-args }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Export image URI
      id: image
      shell: bash
      run: |
        echo "uri=${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}" >> "$GITHUB_OUTPUT"
